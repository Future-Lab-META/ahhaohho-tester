<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아하오호 아크크 작품집</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand-black: #0B1215;
    --brand-neon: #edff4b;
    --bg: #FFF8F0;
    --text-main: #1a1a1a;
    --text-sub: #666;
  }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: #010007;
    display: flex;
    align-items: center;
    padding: 24px 64px;
    position: relative;
    overflow: hidden;
  }

  .header-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .header-glow {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(26,60,255,0.15) 0%, transparent 65%);
    right: -60px; top: -120px;
  }

  .header-badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
  }

  /* 404 CONTENT */
  .error-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 16px;
    text-align: center;
  }

  .error-code {
    font-family: 'Poppins', sans-serif;
    font-size: 96px;
    font-weight: 900;
    color: var(--brand-black);
    opacity: 0.08;
    line-height: 1;
    margin-bottom: -16px;
  }

  .error-icon {
    font-size: 52px;
    margin-bottom: 8px;
  }

  .error-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-main);
  }

  .error-desc {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.7;
  }

  .app-btn {
    margin-top: 12px;
    display: inline-block;
    background: var(--brand-black);
    color: var(--brand-neon);
    font-size: 14px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .app-btn:hover { opacity: 0.85; }

  /* FOOTER */
  .footer { text-align: center; padding: 40px 20px; font-size: 13px; color: #bbb; }
  .footer strong { color: var(--brand-black); font-weight: 700; }

  @media (max-width: 700px) {
    .header { padding: 20px 32px; }
    .error-code { font-size: 72px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <svg class="header-stars" viewBox="0 0 800 80" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="20" r="1.0" fill="white" opacity="0.6"/>
    <circle cx="160" cy="50" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="280" cy="15" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="400" cy="40" r="0.7" fill="#EBFF32" opacity="0.4"/>
    <circle cx="520" cy="25" r="1.1" fill="white" opacity="0.5"/>
    <circle cx="640" cy="55" r="0.9" fill="white" opacity="0.5"/>
    <circle cx="730" cy="18" r="1.3" fill="#1DFFEE" opacity="0.3"/>
    <circle cx="200" cy="65" r="0.8" fill="white" opacity="0.3"/>
    <circle cx="460" cy="70" r="1.0" fill="#EBFF32" opacity="0.3"/>
    <circle cx="680" cy="38" r="0.7" fill="white" opacity="0.4"/>
  </svg>
  <div class="header-glow"></div>
  <div class="header-badge">AHHA OHHO</div>
</div>

<!-- 404 CONTENT -->
<div class="error-section">
  <div class="error-code">404</div>
  <div class="error-icon">📭</div>
  <div class="error-title">더 이상 존재하지 않는 작품집이에요</div>
  <div class="error-desc">링크가 만료되었거나 계정이 삭제된 것 같아요.</div>
</div>

<div class="footer">
  <strong>아하오호</strong>에서 만든 창작 기록 · futurelab.center
</div>

</body>
</html>
