<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피처드 프로젝트 선정 보드 편집기</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

  /* ── RESET ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand-black: #0B1215;
    --brand-neon: #edff4b;
    --bg-board: #FFF8F0;
    --ed-bg: #18191b;
    --ed-surface: rgba(255,255,255,0.05);
    --ed-border: rgba(255,255,255,0.09);
    --ed-text: #e2e2e2;
    --ed-sub: rgba(255,255,255,0.38);
  }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ── APP LAYOUT ── */
  .app { display: flex; height: 100vh; }

  /* ─────────────────────────
     EDITOR PANEL (left)
  ───────────────────────── */
  .editor {
    width: 368px;
    flex-shrink: 0;
    background: var(--ed-bg);
    color: var(--ed-text);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--ed-border);
    overflow: hidden;
  }

  .editor-top {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--ed-border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .editor-top-logo { font-size: 18px; }
  .editor-top-title { font-size: 14px; font-weight: 800; color: var(--brand-neon); }

  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .editor-scroll::-webkit-scrollbar { width: 4px; }
  .editor-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  /* Section label */
  .sec-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--ed-sub);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Input group */
  .ig { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .ig:last-child { margin-bottom: 0; }
  .ig label { font-size: 11px; font-weight: 600; color: var(--ed-sub); }
  .ig input, .ig textarea {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 8px;
    padding: 9px 11px;
    color: var(--ed-text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .ig input:focus, .ig textarea:focus { border-color: var(--brand-neon); }
  .ig textarea { resize: none; height: 58px; line-height: 1.5; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Add card button */
  .add-card-btn {
    width: 100%;
    padding: 10px;
    background: rgba(237,255,75,0.08);
    border: 1.5px dashed rgba(237,255,75,0.3);
    border-radius: 8px;
    color: var(--brand-neon);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .add-card-btn:hover { background: rgba(237,255,75,0.16); }

  /* Card item in editor */
  .card-item {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .card-item:last-child { margin-bottom: 0; }

  .card-item-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 13px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--ed-border);
  }
  .card-item-hd span { font-size: 11px; font-weight: 700; color: var(--ed-sub); }
  .card-del-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.25);
    cursor: pointer; font-size: 15px; line-height: 1;
    transition: color 0.15s;
  }
  .card-del-btn:hover { color: #ff6b6b; }

  .card-item-bd { padding: 11px 13px; display: flex; flex-direction: column; gap: 7px; }

  /* Image upload area (in editor) */
  .img-area {
    width: 100%;
    aspect-ratio: 4/3;
    border: 1.5px dashed rgba(255,255,255,0.13);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.03);
    transition: border-color 0.15s;
    position: relative;
  }
  .img-area:hover { border-color: var(--brand-neon); }
  .img-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .img-placeholder .ph-icon { font-size: 22px; opacity: 0.35; }
  .img-placeholder span { font-size: 11px; color: var(--ed-sub); font-weight: 600; }

  .card-name-in {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 8px;
    padding: 8px 11px;
    color: var(--ed-text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .card-name-in:focus { border-color: var(--brand-neon); }

  .card-reason-in {
    background: var(--ed-surface);
    border: 1px solid var(--ed-border);
    border-radius: 8px;
    padding: 8px 11px;
    color: var(--ed-text);
    font-family: inherit;
    font-size: 12px;
    outline: none;
    width: 100%;
    resize: none;
    height: 56px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .card-reason-in:focus { border-color: var(--brand-neon); }

  /* Editor footer */
  .editor-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--ed-border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .exp-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  .exp-btn:hover { transform: translateY(-1px); }
  .exp-btn.primary { background: var(--brand-neon); color: var(--brand-black); }
  .exp-btn.secondary { background: rgba(255,255,255,0.07); color: var(--ed-text); }

  /* ─────────────────────────
     PREVIEW AREA (right)
  ───────────────────────── */
  .preview-area {
    flex: 1;
    overflow: auto;
    background: #242424;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 36px;
  }

  .board-scale-wrap { transform-origin: top center; }

  /* ─────────────────────────
     BOARD (always 1200px)
  ───────────────────────── */
  #board {
    width: 1200px;
    background: var(--bg-board);
    font-family: 'Pretendard', sans-serif;
  }

  .board-header {
    background: var(--brand-neon);
    padding: 88px 64px 96px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .hd-deco-dot {
    position: absolute;
    width: 140px; height: 140px;
    background: var(--brand-black);
    border-radius: 50%;
    bottom: -40px; right: 240px;
    opacity: 0.06;
    pointer-events: none;
  }

  .hd-left {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; gap: 16px;
  }

  .board-logo { width: 120px; }

  .board-title {
    font-size: 42px; font-weight: 900;
    color: var(--brand-black);
    line-height: 1.3; letter-spacing: -0.02em;
  }
  .board-title em {
    display: inline; font-style: normal;
    background: var(--brand-black);
    color: var(--brand-neon);
    padding: 2px 12px 5px;
    border-radius: 6px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  .board-meta {
    font-family: 'Poppins', sans-serif;
    font-size: 16px; font-weight: 600;
    color: rgba(11,18,21,0.45);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .hd-right { display: none; }

  /* Cards */
  .board-body { padding: 48px 64px 64px; }

  /* 카드 행 (3개씩) — 페이지 중간에 잘리지 않게 */
  .board-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 24px;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .board-row:last-child { margin-bottom: 0; }

  /* 2페이지~: 헤더 없이 카드만 */
  .board-continuation {
    padding: 48px 64px 64px;
  }

  .b-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }

  .b-card-img {
    width: 100%; position: relative; padding-bottom: 75%; /* 4:3 비율 (html2canvas 호환) */
    overflow: hidden;
    background: #ededed;
  }
  .b-card-img .bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center; background-repeat: no-repeat;
  }
  .b-card-img .no-img {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; opacity: 0.18;
  }

  .b-card-body { padding: 18px 20px 22px; display: flex; flex-direction: column; gap: 8px; height: 160px; overflow: hidden; }

  .b-card-name { font-size: 15px; font-weight: 600; color: var(--brand-black); }
  .b-card-name.is-placeholder { color: rgba(11,18,21,0.35); } /* 닉네임 미입력 시 회색 */

  .b-card-tag {
    display: inline-block;
    background: rgba(11,18,21,0.07);
    color: rgba(11,18,21,0.55);
    font-size: 11px; font-weight: 700;
    padding: 3px 9px;
    border-radius: 100px;
  }

  .b-card-reason {
    font-size: 12.5px;
    color: rgba(11,18,21,0.5);
    line-height: 1.55;
    word-break: break-word;
    overflow-wrap: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }

  .reason-counter {
    text-align: right;
    font-size: 11px;
    color: var(--ed-sub);
    margin-top: 2px;
  }
  .reason-counter.over { color: #ff6b6b; }

  .board-empty {
    text-align: center;
    padding: 60px 0;
    color: rgba(11,18,21,0.2);
    font-size: 15px;
  }

  /* ─────────────────────────
     캐러셀: 카드 1장 = 1페이지
  ───────────────────────── */
  .board-page { position: relative; width: 1200px; height: 700px; background: #FDFCF8; }

  /* 축소 헤더 (카드마다 상단) — 검정 배경 / 흰 로고 / 반전 텍스트 */
  .page-header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 2;
    background: var(--brand-black);
    padding: 30px 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-header .board-logo { width: 56px; } /* 아하오호 로고 (흰 프레임/검정 글자) */
  .ph-right { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; text-align: left; }
  .ph-titlerow { display: flex; align-items: center; gap: 10px; }
  .ph-icon { height: 38px; width: auto; }
  .ph-title {
    font-size: 26px; font-weight: 600; color: #ffffff;
    line-height: 1.25; letter-spacing: -0.02em;
  }
  .ph-title em {
    font-style: normal; background: var(--brand-neon); color: var(--brand-black);
    padding: 1px 9px 3px; border-radius: 5px;
    -webkit-box-decoration-break: clone; box-decoration-break: clone;
  }
  .ph-meta {
    font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* 큰 카드 */
  /* 카드-wrap이 페이지 전체 높이. 헤더(상단 오버레이) 아래 영역에서 카드 중앙 정렬 → 상하 여백은 카드 높이에 따라 자동 조절 */
  .page-card-wrap { height: 100%; padding: 108px 64px 0; display: flex; align-items: center; justify-content: center; background: #FDFCF8; }
  /* 카드는 이미지 크기에 맞춰 shrink → 세로/가로 카드 크기 차이 최소화 */
  .board-page .b-card { width: auto; max-width: 480px; box-shadow: 0 12px 44px rgba(0,0,0,0.10); }
  /* 업로드 이미지 실제 비율 유지하되 프레임(가로·세로 상한) 안에 맞춤 */
  .board-page .b-card-img { padding-bottom: 0; height: auto; }
  .board-page .b-card-img .bg-img { display: block; width: auto; height: auto; max-width: 480px; max-height: 420px; }
  .board-page .b-card-img .no-img { position: static; width: 480px; height: 320px; }
  .board-page .b-card-body { height: auto; padding: 28px 34px 34px; gap: 14px; }
  .board-page .b-card-name { font-size: 30px; }
  .board-page .b-card-tag { font-size: 15px; padding: 5px 14px; }
  .board-page .b-card-reason {
    font-size: 18px; line-height: 1.65;
    -webkit-line-clamp: unset; display: block; overflow: visible;
  }

  /* 캐러셀 네비게이션 */
  .preview-area { position: relative; }
  .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 20;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22);
    color: #fff; font-size: 26px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.24); }
  .nav-btn:disabled { opacity: 0.22; cursor: default; }
  .nav-prev { left: 16px; }
  .nav-next { right: 16px; }
  .page-indicator {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20;
    display: none;
    background: rgba(0,0,0,0.55); color: #fff;
    font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600;
    padding: 6px 15px; border-radius: 100px;
  }

  /* ── PRINT ── */
  @media print {
    @page { margin: 0; size: A4 portrait; }
    body { overflow: visible; height: auto; }
    .app { display: block; height: auto; }
    .editor { display: none !important; }
    .preview-area { padding: 0; background: none; display: block; overflow: visible; }
    .board-scale-wrap { transform: none !important; width: auto !important; height: auto !important; }
    #board { width: 100%; box-shadow: none; }
    .page-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #0B1215 !important; }
    .ph-title em { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .b-card-tag { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .b-card { box-shadow: none !important; border: 1px solid #ebebeb; }
    .b-card-body { height: auto !important; overflow: visible !important; }
    .b-card-reason { overflow: visible !important; display: block !important; -webkit-line-clamp: unset !important; }
    /* 인쇄: 모든 카드 페이지 표시, 카드 1장 = 1페이지 */
    .board-page { display: block !important; height: auto !important; break-after: page; page-break-after: always; break-inside: avoid; }
    .board-page:last-child { break-after: auto; page-break-after: auto; }
    .page-card-wrap { height: auto !important; padding: 120px 56px 48px; }
    .board-page .b-card { width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── 편집 패널 ── -->
  <aside class="editor">
    <div class="editor-top">
      <span class="editor-top-logo">⭐</span>
      <span class="editor-top-title">피처드 프로젝트 선정 보드</span>
    </div>

    <div class="editor-scroll">

      <!-- 기본 정보 -->
      <div>
        <div class="sec-label">기본 정보</div>
        <div class="row2">
          <div class="ig">
            <label>기수</label>
            <input type="text" id="in-kisu" placeholder="3기" oninput="debouncedRender()">
          </div>
          <div class="ig">
            <label>주차</label>
            <input type="text" id="in-week" placeholder="3주차" oninput="debouncedRender()">
          </div>
        </div>
        <div class="ig">
          <label>기간</label>
          <div class="row2">
            <input type="date" id="in-date-start" oninput="debouncedRender()" placeholder="시작일">
            <input type="date" id="in-date-end" oninput="debouncedRender()" placeholder="종료일">
          </div>
        </div>
      </div>

      <!-- 카드 -->
      <div>
        <div class="sec-label">선정 카드</div>
        <div id="cards-container"></div>
        <button class="add-card-btn" onclick="addCard()">+ 카드 추가</button>
      </div>

    </div>

    <div class="editor-footer">
      <!-- 파일 저장/불러오기 -->
      <div style="display:flex;gap:7px;margin-bottom:2px">
        <button class="exp-btn secondary" style="flex:1" onclick="saveToFile()">💾 파일로 저장</button>
        <button class="exp-btn secondary" style="flex:1" onclick="document.getElementById('load-file-input').click()">📂 불러오기</button>
        <input type="file" id="load-file-input" accept=".json" style="display:none" onchange="loadFromFile(this)">
      </div>
      <button class="exp-btn primary" onclick="exportImage()">🖼️ 이미지로 저장 (페이지별)</button>
      <button class="exp-btn secondary" onclick="window.print()">🖨️ PDF로 저장</button>
    </div>
  </aside>

  <!-- ── 미리보기 ── -->
  <main class="preview-area" id="preview-area">
    <button class="nav-btn nav-prev" id="nav-prev" onclick="prevPage()" aria-label="이전 카드">‹</button>
    <div class="board-scale-wrap" id="board-scale-wrap">
      <div id="board"></div>
    </div>
    <button class="nav-btn nav-next" id="nav-next" onclick="nextPage()" aria-label="다음 카드">›</button>
    <div class="page-indicator" id="page-indicator"></div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
/* ── STATE ── */
let cards = [];
let nextId = 1;

/* ── 파일 저장 ── */
function saveToFile() {
  const { kisu, week, period } = getInfo();
  const state = {
    kisu:      document.getElementById('in-kisu').value,
    week:      document.getElementById('in-week').value,
    dateStart: document.getElementById('in-date-start').value,
    dateEnd:   document.getElementById('in-date-end').value,
    cards:     cards.map(c => ({
      id: c.id, name: c.name, challenge: c.challenge, reason: c.reason,
      image: c.image || null   // base64 포함
    })),
  };
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  const fileName = ['아크크', ...[kisu, week].filter(Boolean), '피처드 프로젝트'].join(' ') + '.json';
  a.download = fileName;
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── 파일 불러오기 ── */
function loadFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);
      // 헤더 정보 복원
      document.getElementById('in-kisu').value       = state.kisu || '';
      document.getElementById('in-week').value       = state.week || '';
      document.getElementById('in-date-start').value = state.dateStart || '';
      document.getElementById('in-date-end').value   = state.dateEnd || '';
      // 카드 복원
      cards = (state.cards || []).map(c => ({
        id: c.id || Date.now() + Math.random(),
        name: c.name || '', challenge: c.challenge || '',
        reason: c.reason || '', image: c.image || null,
      }));
      nextId = cards.length ? Math.max(...cards.map(c => c.id)) + 1 : 1;
      renderEditorCards();
      render();
      // 이미지 영역 복원
      cards.forEach(card => {
        if (card.image) {
          const area = document.getElementById('img-area-' + card.id);
          if (area) area.innerHTML = `<img src="${card.image}" style="width:100%;height:100%;object-fit:cover;">
            <input type="file" id="file-${card.id}" accept="image/*" style="display:none" onchange="handleImage(this,${card.id})">`;
        }
      });
    } catch {
      alert('파일을 불러오는 데 실패했어요. 올바른 JSON 파일인지 확인해주세요.');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

/* ── 디바운스 렌더 — 타이핑 멈춘 후 300ms 뒤 한 번만 렌더 ── */
let renderTimer = null;
function debouncedRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 300);
}

/* ── HELPERS ── */
function getInfo() {
  const kisu = document.getElementById('in-kisu').value.trim();
  const week = document.getElementById('in-week').value.trim();
  const startRaw = document.getElementById('in-date-start').value;
  const endRaw = document.getElementById('in-date-end').value;
  function fmt(raw) {
    if (!raw) return '';
    const [y, m, d] = raw.split('-');
    return `${y}.${m}.${d}`;
  }
  const start = fmt(startRaw);
  const end = fmt(endRaw);
  let period = '';
  if (start && end) period = `${start} ~ ${end}`;
  else if (start) period = start;
  return { kisu, week, period };
}

/* ── CARD ACTIONS ── */
function addCard() {
  const id = nextId++;
  cards.push({ id, image: null, name: '', challenge: '', reason: '' });
  renderEditorCards();
  render();
}

function removeCard(id) {
  cards = cards.filter(c => c.id !== id);
  renderEditorCards();
  render();
}

function updateCard(id, field, value) {
  const card = cards.find(c => c.id === id);
  if (card) { card[field] = value; debouncedRender(); }
}

function updateCounter(id, field, value) {
  const limits = { name: 10, challenge: 20, reason: 60 };
  const max = limits[field];
  const el = document.getElementById(`counter-${field}-${id}`);
  if (!el) return;
  el.textContent = `${value.length}/${max}`;
  el.className = 'reason-counter' + (value.length >= max ? ' over' : '');
}

function handleImage(input, id) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const card = cards.find(c => c.id === id);
    if (!card) return;
    card.image = e.target.result;
    // update just the img area in editor (no full re-render to preserve focus)
    const area = document.getElementById('img-area-' + id);
    if (area) {
      area.innerHTML = `<img src="${e.target.result}">
        <input type="file" id="file-${id}" accept="image/*" style="display:none" onchange="handleImage(this,${id})">`;
    }
    render();
  };
  reader.readAsDataURL(file);
}

function triggerUpload(id) {
  document.getElementById('file-' + id).click();
}

/* ── RENDER EDITOR CARDS ── */
function renderEditorCards() {
  document.getElementById('cards-container').innerHTML = cards.map((card, i) => `
    <div class="card-item">
      <div class="card-item-hd">
        <span>카드 ${i + 1}</span>
        <button class="card-del-btn" onclick="removeCard(${card.id})">✕</button>
      </div>
      <div class="card-item-bd">
        <div class="img-area" id="img-area-${card.id}" onclick="triggerUpload(${card.id})">
          ${card.image
            ? `<img src="${card.image}">`
            : `<div class="img-placeholder"><div class="ph-icon">🖼️</div><span>클릭해서 이미지 추가</span></div>`}
          <input type="file" id="file-${card.id}" accept="image/*" style="display:none" onchange="handleImage(this,${card.id})">
        </div>
        <input class="card-name-in" type="text" placeholder="닉네임" maxlength="10"
          value="${escHtml(card.name)}"
          oninput="updateCard(${card.id},'name',this.value);updateCounter(${card.id},'name',this.value)">
        <div class="reason-counter" id="counter-name-${card.id}">${card.name.length}/10</div>
        <input class="card-name-in" type="text" placeholder="챌린지명 (예: 바다 챌린지)" maxlength="20"
          style="font-weight:400"
          value="${escHtml(card.challenge)}"
          oninput="updateCard(${card.id},'challenge',this.value);updateCounter(${card.id},'challenge',this.value)">
        <div class="reason-counter" id="counter-challenge-${card.id}">${card.challenge.length}/20</div>
        <textarea class="card-reason-in" placeholder="선정 이유 (최대 60자)"
          maxlength="60"
          oninput="updateCard(${card.id},'reason',this.value);updateCounter(${card.id},'reason',this.value)">${escHtml(card.reason)}</textarea>
        <div class="reason-counter" id="counter-reason-${card.id}">${card.reason.length}/60</div>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 카드 1개 HTML ── */
function cardHtml(card) {
  return `
    <div class="b-card">
      <div class="b-card-img">
        ${card.image ? `<img class="bg-img" src="${card.image}" alt="">` : `<div class="no-img">🖼️</div>`}
      </div>
      <div class="b-card-body">
        <div class="b-card-name${card.name ? '' : ' is-placeholder'}">${escHtml(card.name) || '닉네임'}</div>
        ${card.challenge ? `<div><span class="b-card-tag">${escHtml(card.challenge)}</span></div>` : ''}
        <div class="b-card-reason">${escHtml(card.reason)}</div>
      </div>
    </div>`;
}

/* 축소 헤더 HTML (카드마다 상단 반복) */
function pageHeaderHtml(kisu, week, period) {
  const metaMid = [kisu, week].filter(Boolean).join(' · ');
  return `
    <div class="page-header">
      <div class="ph-right">
        <div class="ph-titlerow">
          <img class="ph-icon" src="../아크크작품집/aha-pick-icon.svg" onerror="this.style.display='none'">
          <div class="ph-title">아하's 픽</div>
        </div>
        ${period ? `<div class="ph-meta">${period}</div>` : ''}
      </div>
      <img class="board-logo" src="../아크크작품집/Logo1-ondark.svg" onerror="this.style.display='none'">
    </div>`;
}

/* 카드 1장 = 1페이지 */
function pageHtml(card, headerHtml) {
  return `
    <div class="board-page">
      ${headerHtml}
      <div class="page-card-wrap">${cardHtml(card)}</div>
    </div>`;
}

let currentPage = 0;

/* ── RENDER BOARD ── */
function render() {
  const { kisu, week, period } = getInfo();
  document.title = ['아크크', ...[kisu, week].filter(Boolean), '피처드 프로젝트'].join(' ');

  const board = document.getElementById('board');
  if (cards.length === 0) {
    board.innerHTML = `<div class="board-page"><div class="board-empty">← 왼쪽에서 카드를 추가해보세요</div></div>`;
  } else {
    const header = pageHeaderHtml(kisu, week, period);
    board.innerHTML = cards.map(c => pageHtml(c, header)).join('');
  }
  showPage(currentPage);
}

/* ── CAROUSEL ── */
function showPage(idx) {
  const pages = document.querySelectorAll('#board .board-page');
  const total = pages.length;
  if (total === 0) return;
  currentPage = Math.max(0, Math.min(idx, total - 1));
  pages.forEach((p, i) => { p.style.display = (i === currentPage) ? 'block' : 'none'; });

  const multi = cards.length > 1;
  const prev = document.getElementById('nav-prev');
  const next = document.getElementById('nav-next');
  const ind = document.getElementById('page-indicator');
  prev.style.display = next.style.display = multi ? 'flex' : 'none';
  prev.disabled = currentPage === 0;
  next.disabled = currentPage === total - 1;
  ind.style.display = cards.length > 0 ? 'block' : 'none';
  ind.textContent = cards.length > 0 ? `${currentPage + 1} / ${cards.length}` : '';

  scaleBoard();
}
function prevPage() { showPage(currentPage - 1); }
function nextPage() { showPage(currentPage + 1); }

/* ── SCALE ── */
function scaleBoard() {
  const area = document.getElementById('preview-area');
  const wrap = document.getElementById('board-scale-wrap');
  const board = document.getElementById('board');
  const availW = area.clientWidth - 72;
  const boardW = 1200;
  const scale = Math.min(availW / boardW, 1);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = boardW + 'px';
  const scaledH = board.scrollHeight * scale;
  wrap.style.marginBottom = (scaledH - board.scrollHeight) + 'px';
}

window.addEventListener('resize', scaleBoard);

/* ── EXPORT IMAGE (페이지별 분할 저장) ── */
async function exportImage() {
  const { kisu, week } = getInfo();
  const wrap = document.getElementById('board-scale-wrap');
  const board = document.getElementById('board');
  const prevTransform = wrap.style.transform;
  wrap.style.transform = 'scale(1)';

  const baseName = ['아크크', ...[kisu, week].filter(Boolean), '피처드 프로젝트'].join(' ');

  try {
    // 카드 1장 = 1페이지: 각 board-page를 개별 이미지로 저장
    const pages = board.querySelectorAll('.board-page');
    if (!pages.length || cards.length === 0) { alert('추가된 카드가 없어요.'); return; }
    for (let i = 0; i < pages.length; i++) {
      const pEl = makePageEl([pages[i]]);
      const clone = pEl.firstElementChild;
      if (clone) clone.style.display = 'block';          // 숨김 페이지 복제 대비
      const logo = pEl.querySelector('.board-logo');
      if (logo) logo.style.opacity = '0';                // html2canvas SVG 이슈 회피(기존 동작 유지)
      const c = await captureEl(pEl);
      pEl.remove();
      dlCanvas(c, `${baseName}_${i + 1}.png`);
    }

  } catch (err) {
    console.error('html2canvas error:', err);
    alert('이미지 저장에 실패했어요. PDF로 저장해주세요.');
  } finally {
    wrap.style.transform = prevTransform;
  }
}

function makePageEl(domNodes) {
  const el = document.createElement('div');
  el.style.cssText = 'width:1200px;background:#FFF8F0;position:fixed;left:-9999px;top:0;z-index:-1;';
  domNodes.forEach(n => { if (n) el.appendChild(n.cloneNode(true)); });
  document.body.appendChild(el);
  return el;
}

function captureEl(el) {
  return html2canvas(el, {
    scale: 2,
    allowTaint: true,
    useCORS: false,
    backgroundColor: '#FFF8F0',
    logging: false,
  });
}

function dlCanvas(canvas, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

/* ── INIT ── */
addCard();
addCard();
</script>
